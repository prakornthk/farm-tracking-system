version: "3.8"

services:
  # Database
  mariadb:
    image: mariadb:10.11
    container_name: farm-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - farm-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - Laravel API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farm-backend
    restart: unless-stopped
    user: "82:82"
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      CACHE_DRIVER: ${CACHE_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      LINE_CLIENT_ID: ${LINE_CLIENT_ID}
      LINE_CLIENT_SECRET: ${LINE_CLIENT_SECRET}
      LINE_REDIRECT_URI: ${LINE_REDIRECT_URI}
    ports:
      - "0.0.0.0:18000:8000"
    volumes:
      - backend_storage:/var/www/storage
      - backend_bootstrap:/var/www/bootstrap/cache
    networks:
      - farm-network
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Web Admin - React SPA
  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
      args:
        VITE_LINE_CLIENT_ID: ${VITE_LINE_CLIENT_ID:-}
    container_name: farm-web-admin
    restart: unless-stopped
    ports:
      - "0.0.0.0:18080:80"
    networks:
      - farm-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # LIFF App - React SPA
  liff-app:
    build:
      context: ./liff-app
      dockerfile: Dockerfile
      args:
        VITE_LIFF_ID: ${LIFF_ID:-}
        VITE_API_BASE: ${VITE_API_BASE:-https://api.farm-system.example.com}
    container_name: farm-liff-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:18081:80"
    networks:
      - farm-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: farm-nginx
    restart: unless-stopped
    profiles:
      - internal-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - farm-network
    depends_on:
      - backend
      - web-admin
      - liff-app
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  farm-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  backend_storage:
    driver: local
  backend_bootstrap:
    driver: local
